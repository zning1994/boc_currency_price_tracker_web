# Bank of China exchange-rate scraper — web repo workflow.
# This repo is a pure data CDN; portal/API live in sibling repos.
# Last updated 2026-04-25 (phase 3 cutover):
#   - Stopped invoking generate_readme.py (homepage now lives in the
#     portal repo, not here).
#   - Removed CNAME echo from the workflow — docs/CNAME is committed
#     in-tree and points at data-bocurrencyprice.techina.science.

name: 'Fetch currency price from BOC Actions'

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout from repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout scraper
        uses: actions/checkout@v4
        with:
          repository: zning1994/boc_currency_price_tracker_new
          ref: main
          token: ${{ secrets.PRIVATE_TOEKEN }}
          path: scripts

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ -f ./scripts/requirements.txt ]; then
            pip install -r ./scripts/requirements.txt
          fi

      - name: Fetch
        run: |
          cd scripts
          python boc_currency_price.py --all --data-dir ../docs/BOC_CURRENCY_PRICE

      - name: Commit if changed
        run: |
          git config --local user.email "zhn038@gmail.com"
          git config --local user.name "ZNing"
          git add docs/BOC_CURRENCY_PRICE
          if git diff --staged --quiet; then
            echo "No rate change since last run, skipping commit."
            exit 0
          fi
          git commit -m "chore: update currency price $(date '+%Y-%m-%d %H:%M:%S')"
          git push
